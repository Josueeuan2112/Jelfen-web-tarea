<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelfen | Plataforma médica</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav>
        <div class="logo" onclick="goHome()">Jelfen</div>
        <button class="profile-btn">¿Eres médico? Únete</button>
    </nav>

    <div id="home">
        <section class="hero">
            <h1>Encuentra médicos especialistas</h1>
            <p>Consulta profesionales certificados desde casa</p>
        </section>
        <div class="search">
            <input id="searchInput" placeholder="Buscar médico o especialidad">
            <i class="fas fa-search"></i>
        </div>
        <div class="doctors" id="doctorList"></div>
    </div>

    <div id="profilePage" class="profile">
        <button class="back" onclick="goHome()">← Volver</button>
        <div id="profileContent"></div>
    </div>

    <!-- CHAT -->
    <div class="chat" id="chat">
        <div class="chat-header" onclick="toggleChat()">
            <span>Asistente médico</span>
            <span>—</span>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input id="input" placeholder="Describe tus síntomas">
            <button onclick="send()">Enviar</button>
        </div>
    </div>

    <footer>
        &copy; 2026 Jelfen - Plataforma médica ficticia para tarea educativa.
    </footer>

    <!-- JAVASCRIPT MODERNO (módulo) -->
    <script type="module" src="js/script.js"></script>
</body>

</html>
